<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="rgba(0,46,71,0.13)"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#FAF8F5"/>

  <!-- White card -->
  <rect x="100" y="60" width="780" height="510" rx="24" fill="white" filter="url(#shadow)"/>

  <!-- Real LeaderReps logo -->
  <image href="data:image/png;base64," x="148" y="100" width="240" height="60" preserveAspectRatio="xMinYMid meet"/>

  <!-- Eyebrow pill -->
  <rect x="148" y="195" width="366" height="36" rx="18" fill="rgba(183,72,37,0.1)"/>
  <circle cx="168" cy="213" r="7" fill="none" stroke="#B84825" stroke-width="1.5"/>
  <text x="185" y="219" fill="#B84825" font-family="system-ui,sans-serif" font-size="15" font-weight="600">The Accountability System Pulse Check</text>

  <!-- Main headline -->
  <text x="148" y="286" fill="#002E47" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800">How Strong Is Your Team&#39;s</text>
  <text x="148" y="348" fill="#002E47" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800">Accountability System?</text>

  <!-- Sub-headline -->
  <text x="148" y="402" fill="#B84825" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="700">Take the 3-Minute Assessment</text>

  <!-- Body -->
  <text x="148" y="446" fill="#475569" font-family="system-ui,sans-serif" font-size="20">Find out where your system is strong, and where it&#39;s leaking.</text>

  <!-- Badge: 3 minutes -->
  <rect x="148" y="472" width="164" height="38" rx="19" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="230" y="496" text-anchor="middle" fill="#002E47" font-family="system-ui,sans-serif" font-size="16" font-weight="600">&#9679; 3 minutes</text>

  <!-- Badge: 7 questions -->
  <rect x="324" y="472" width="178" height="38" rx="19" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="413" y="496" text-anchor="middle" fill="#002E47" font-family="system-ui,sans-serif" font-size="16" font-weight="600">&#10003; 7 questions</text>

  <!-- CTA button -->
  <rect x="148" y="524" width="298" height="48" rx="10" fill="#B84825"/>
  <text x="297" y="554" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="700">Start the Pulse Check  &#8594;</text>

  <!-- Right side score cards (matching live bands) -->
  <!-- Strong System -->
  <rect x="930" y="80" width="222" height="138" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="930" y="80" width="6" height="138" rx="3" fill="#47A88D"/>
  <text x="950" y="117" fill="#277A68" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">6&#8211;7 YES</text>
  <text x="950" y="143" fill="#002E47" font-family="system-ui,sans-serif" font-size="18" font-weight="800">Strong System</text>
  <text x="950" y="163" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">Doing real work.</text>
  <text x="950" y="180" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">Sharpen the edges.</text>

  <!-- Room to Strengthen -->
  <rect x="930" y="240" width="222" height="138" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="930" y="240" width="6" height="138" rx="3" fill="#B84825"/>
  <text x="950" y="277" fill="#B84825" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">3&#8211;5 YES</text>
  <text x="950" y="303" fill="#002E47" font-family="system-ui,sans-serif" font-size="18" font-weight="800">Room to Strengthen</text>
  <text x="950" y="323" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">A few targeted reps</text>
  <text x="950" y="340" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">close the gaps.</text>

  <!-- System Not Yet Installed -->
  <rect x="930" y="400" width="222" height="138" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="930" y="400" width="6" height="138" rx="3" fill="#002E47"/>
  <text x="950" y="437" fill="#002E47" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">0&#8211;2 YES</text>
  <text x="950" y="463" fill="#002E47" font-family="system-ui,sans-serif" font-size="18" font-weight="800">System Not Yet</text>
  <text x="950" y="485" fill="#002E47" font-family="system-ui,sans-serif" font-size="18" font-weight="800">Installed</text>
  <text x="950" y="510" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">Time to rebuild.</text>
</svg>