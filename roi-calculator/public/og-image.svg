<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002E47"/>
      <stop offset="100%" style="stop-color:#003d5c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="1100" cy="100" r="200" fill="#47A88D" opacity="0.1"/>
  <circle cx="100" cy="530" r="150" fill="#E04E1B" opacity="0.1"/>
  
  <!-- Graph bars decoration -->
  <rect x="800" y="380" width="60" height="120" rx="8" fill="#47A88D" opacity="0.3"/>
  <rect x="880" y="320" width="60" height="180" rx="8" fill="#47A88D" opacity="0.5"/>
  <rect x="960" y="260" width="60" height="240" rx="8" fill="#47A88D" opacity="0.7"/>
  <rect x="1040" y="200" width="60" height="300" rx="8" fill="url(#greenGrad)"/>
  
  <!-- Main content -->
  <text x="100" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#ffffff">Leadership</text>
  <text x="100" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#ffffff">Development</text>
  <text x="100" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#10B981">ROI Calculator</text>
  
  <text x="100" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">Calculate your return on leadership investment</text>
  
  <!-- Stats -->
  <rect x="100" y="490" width="180" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="140" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Avg. ROI</text>
  <text x="140" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#10B981">340%</text>
  
  <rect x="300" y="490" width="180" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="340" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Free</text>
  <text x="340" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff">2 Minutes</text>
  
  <!-- LeaderReps branding -->
  <text x="1100" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="end">LeaderReps</text>
</svg>
